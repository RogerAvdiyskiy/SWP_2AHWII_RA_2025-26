<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Essensliste mit ms()</title>
</head>
<body>
    <div class="container">
        <h1>Essensliste</h1>
        
        <div class="status-bar">
            <span id="loading-status" class="status"></span>
            <span id="last-load-time" class="time-info"></span>
            <span id="load-count" class="load-count"></span>
        </div>
        
        <div class="controls">
            <button id="hole-essen">Essen laden</button>
            <button id="loesche-essen">Liste leeren</button>
            <button id="auto-refresh">Auto-Refresh: AUS</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Essen</th>
                    </tr>
                </thead>
                <tbody id="tabelle"></tbody>
            </table>
        </div>

        <div class="ms-section">
            <h2>ms() Zeit-Umwandler</h2>
            <p>Wandle Zeitangaben in Millisekunden um:</p>
            <div class="ms-controls">
                <input type="text" id="ms-input" placeholder="z.B. 2 days, 1h 30m, 5 minutes">
                <button id="umwandeln">Umwandeln</button>
            </div>
            <p id="ergebnis" class="ergebnis"></p>
            <div id="ms-beispiele" class="beispiele"></div>
        </div>
        
        <div class="info-section">
            <h3>Über ms()</h3>
            <p>Das <code>ms()</code> Paket konvertiert zwischen Zeitstrings und Millisekunden.</p>
            <ul>
                <li><code>ms("2 days")</code> → Millisekunden</li>
                <li><code>ms(86400000)</code> → "1 day"</li>
            </ul>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    
    <script>
        let autoRefreshInterval = null;
        
        document.getElementById("auto-refresh").addEventListener("click", function() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                this.textContent = "Auto-Refresh: AUS";
            } else {
                window.holeEssen();
                autoRefreshInterval = setInterval(window.holeEssen, 30000);
                this.textContent = "Auto-Refresh: AN (30s)";
            }
        });
    </script>
</body>
</html>
